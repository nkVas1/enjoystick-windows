name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: MSVC x64 ${{ matrix.config }}
    runs-on: windows-latest   # windows-latest = VS 2022
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Ninja
        run: choco install ninja --no-progress -y
        shell: pwsh

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Configure (Ninja + MSVC)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -B build/${{ matrix.config }} ^  
            -G Ninja ^  
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} ^  
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^  
            -DVCPKG_TARGET_TRIPLET=x64-windows ^  
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build/${{ matrix.config }} --parallel

      - name: Upload Release artifact
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: EnjoyStick-Release-x64
          path: build/Release/EnjoyStick.exe
          if-no-files-found: warn

      - name: Upload Debug artifact
        if: matrix.config == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: EnjoyStick-Debug-x64
          path: build/Debug/EnjoyStick.exe
          if-no-files-found: warn
